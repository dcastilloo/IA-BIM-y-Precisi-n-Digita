<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <linearGradient id="fondo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="60%" stop-color="#0b243d"/>
      <stop offset="100%" stop-color="#07394b"/>
    </linearGradient>
    <filter id="sombra" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="flecha" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#1fd6ff"/>
    </marker>
  </defs>

  <rect width="900" height="560" fill="url(#fondo)"/>
  <text x="450" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="bold" fill="#ffffff">Flujo de Información BIM</text>
  <text x="450" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#a9eafa">Modelo, documentos, datos y decisiones conectadas</text>

  <!-- Centro CDE -->
  <g filter="url(#sombra)">
    <circle cx="450" cy="285" r="88" fill="#f6fbff" stroke="#1fd6ff" stroke-width="5"/>
    <rect x="397" y="244" width="106" height="76" rx="10" fill="#102a44"/>
    <rect x="410" y="258" width="80" height="10" rx="5" fill="#1fd6ff"/>
    <rect x="410" y="279" width="80" height="10" rx="5" fill="#8ff5ff"/>
    <rect x="410" y="300" width="55" height="10" rx="5" fill="#1fd6ff"/>
    <text x="450" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0b132b">CDE</text>
  </g>

  <!-- Cajas externas -->
  <g font-family="Arial, sans-serif" filter="url(#sombra)">
    <rect x="95" y="160" width="190" height="95" rx="18" fill="#eaf8ff"/>
    <text x="190" y="198" text-anchor="middle" font-size="21" font-weight="bold" fill="#0b132b">Modelo BIM</text>
    <text x="190" y="225" text-anchor="middle" font-size="15" fill="#25435d">Geometría + datos</text>

    <rect x="615" y="160" width="190" height="95" rx="18" fill="#eaf8ff"/>
    <text x="710" y="198" text-anchor="middle" font-size="21" font-weight="bold" fill="#0b132b">Documentos</text>
    <text x="710" y="225" text-anchor="middle" font-size="15" fill="#25435d">Planos e informes</text>

    <rect x="95" y="355" width="190" height="95" rx="18" fill="#eaf8ff"/>
    <text x="190" y="393" text-anchor="middle" font-size="21" font-weight="bold" fill="#0b132b">Roles</text>
    <text x="190" y="420" text-anchor="middle" font-size="15" fill="#25435d">Equipo y permisos</text>

    <rect x="615" y="355" width="190" height="95" rx="18" fill="#eaf8ff"/>
    <text x="710" y="393" text-anchor="middle" font-size="21" font-weight="bold" fill="#0b132b">Validación</text>
    <text x="710" y="420" text-anchor="middle" font-size="15" fill="#25435d">Reglas y control</text>
  </g>

  <!-- Flechas -->
  <g fill="none" stroke="#1fd6ff" stroke-width="5" marker-end="url(#flecha)" opacity="0.9">
    <path d="M285 205 C340 205,360 235,386 258"/>
    <path d="M615 205 C560 205,535 235,514 258"/>
    <path d="M285 402 C340 398,365 350,390 315"/>
    <path d="M615 402 C560 398,535 350,510 315"/>
  </g>

  <!-- Conceptos inferiores -->
  <g font-family="Arial, sans-serif" font-size="16" fill="#ffffff">
    <rect x="255" y="495" width="390" height="36" rx="18" fill="#102a44" stroke="#1fd6ff" stroke-width="2"/>
    <text x="450" y="519" text-anchor="middle">Trazabilidad · Interoperabilidad · Gobernanza</text>
  </g>
</svg>
