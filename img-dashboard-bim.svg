<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <linearGradient id="fondo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b132b"/>
      <stop offset="100%" stop-color="#123d66"/>
    </linearGradient>
    <filter id="sombra" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="900" height="560" fill="url(#fondo)"/>

  <!-- Pantalla principal -->
  <rect x="95" y="70" width="710" height="420" rx="24" fill="#f6fbff" filter="url(#sombra)"/>
  <rect x="95" y="70" width="710" height="64" rx="24" fill="#0f2742"/>
  <circle cx="135" cy="102" r="8" fill="#ff5f57"/>
  <circle cx="163" cy="102" r="8" fill="#febc2e"/>
  <circle cx="191" cy="102" r="8" fill="#28c840"/>
  <text x="450" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">Dashboard BIM Inteligente</text>

  <!-- Paneles -->
  <rect x="130" y="165" width="210" height="125" rx="16" fill="#eaf8ff" stroke="#b6e9ff" stroke-width="3"/>
  <rect x="370" y="165" width="400" height="125" rx="16" fill="#eaf8ff" stroke="#b6e9ff" stroke-width="3"/>
  <rect x="130" y="320" width="305" height="125" rx="16" fill="#eaf8ff" stroke="#b6e9ff" stroke-width="3"/>
  <rect x="465" y="320" width="305" height="125" rx="16" fill="#eaf8ff" stroke="#b6e9ff" stroke-width="3"/>

  <!-- Tarjeta 1 -->
  <text x="155" y="200" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0b132b">Modelos revisados</text>
  <text x="155" y="255" font-family="Arial, sans-serif" font-size="50" font-weight="bold" fill="#00a4d6">84%</text>
  <circle cx="290" cy="237" r="35" fill="none" stroke="#d5eef7" stroke-width="12"/>
  <path d="M290 202 A35 35 0 1 1 260 255" fill="none" stroke="#00a4d6" stroke-width="12" stroke-linecap="round"/>

  <!-- Gráfico de barras -->
  <text x="395" y="200" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0b132b">Validaciones por semana</text>
  <rect x="410" y="245" width="38" height="25" rx="5" fill="#00a4d6"/>
  <rect x="470" y="225" width="38" height="45" rx="5" fill="#00a4d6"/>
  <rect x="530" y="210" width="38" height="60" rx="5" fill="#00a4d6"/>
  <rect x="590" y="190" width="38" height="80" rx="5" fill="#00a4d6"/>
  <rect x="650" y="215" width="38" height="55" rx="5" fill="#00a4d6"/>
  <line x1="395" y1="270" x2="725" y2="270" stroke="#93a4b8" stroke-width="2"/>

  <!-- Lista de estados -->
  <text x="155" y="355" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0b132b">Estados de información</text>
  <circle cx="160" cy="385" r="8" fill="#28c840"/>
  <text x="180" y="391" font-family="Arial, sans-serif" font-size="16" fill="#0b132b">Aprobado para coordinación</text>
  <circle cx="160" cy="415" r="8" fill="#febc2e"/>
  <text x="180" y="421" font-family="Arial, sans-serif" font-size="16" fill="#0b132b">Pendiente de revisión</text>

  <!-- Panel de IA -->
  <text x="490" y="355" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0b132b">Alertas generadas por IA</text>
  <rect x="495" y="380" width="240" height="18" rx="9" fill="#d5eef7"/>
  <rect x="495" y="380" width="175" height="18" rx="9" fill="#00a4d6"/>
  <rect x="495" y="412" width="240" height="18" rx="9" fill="#d5eef7"/>
  <rect x="495" y="412" width="120" height="18" rx="9" fill="#00a4d6"/>

  <text x="450" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#a9eafa">Los datos deben interpretarse con reglas claras del proceso BIM</text>
</svg>
